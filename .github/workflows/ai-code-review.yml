name: AI Code Review (Gemini)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          echo "diff_size=$(wc -c < diff.txt)" >> $GITHUB_OUTPUT

      - name: AI Review via Gemini API
        if: steps.diff.outputs.diff_size != '0'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(cat diff.txt | head -c 10000)

          PROMPT="あなたはシニアエンジニアです。以下のgit diffをレビューしてください。

## レビュー観点
- バグ・ロジックエラー
- セキュリティリスク
- パフォーマンス問題
- コードの可読性・保守性
- ベストプラクティス違反

## 出力形式（Markdown）
### 📊 総評
（2〜3文で全体の評価）

### 🔴 重大な問題
（あれば箇条書き。なければ「なし」）

### 🟡 改善提案
（具体的なコード行の指摘を含む箇条書き）

### 🟢 良い点
（良い実装があれば称賛）

---
*Reviewed by Gemini AI (無料枠)*

## Diff
\`\`\`diff
$DIFF
\`\`\`"

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { maxOutputTokens: 1500 }
            }')")

          COMMENT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "$COMMENT"