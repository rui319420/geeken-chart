name: CI & AI Code Review

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened] 

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────
  # 1. Lint & Type Check
  # ──────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: パッケージをインストール
        run: npm ci

      - name: Prettier チェック
        run: npm run format:check

      - name: ESLint チェック
        run: npm run lint

      - name: TypeScript 型チェック
        run: npm run typecheck

  # ──────────────────────────────────────
  # 2. Build
  # ──────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        with:
          node-version: 22
          cache: "npm"
        uses: actions/setup-node@v4

      - name: パッケージをインストール
        run: npm ci

      - name: Next.js ビルド
        run: npm run build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          GITHUB_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

  # ──────────────────────────────────────
  # 3. AI Code Review
  # ──────────────────────────────────────
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request' # プルリクエストの時のみ実行
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          echo "diff_size=$(wc -c < diff.txt)" >> $GITHUB_OUTPUT

      - name: AI Review via Gemini API
        if: steps.diff.outputs.diff_size != '0'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(cat diff.txt | head -c 10000)

          PROMPT="あなたはシニアエンジニアです。以下のgit diffをレビューしてください。

          ## レビュー観点
          - バグ・ロジックエラー
          - セキュリティリスク
          - パフォーマンス問題
          - コードの可読性・保守性
          - ベストプラクティス違反

          ## 出力形式（Markdown）
          ### 📊 総評
          ### 🔴 重大な問題
          ### 🟡 改善提案
          ### 🟢 良い点

          ---
          *Reviewed by Gemini AI*

          ## Diff
          \`\`\`diff
          $DIFF
          \`\`\`"

          # モデル名を最新の gemini-2.0-flash に修正
          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { maxOutputTokens: 2000 }
            }')")

          # デバッグ用ログ
          echo "Debug: API Response is $RESPONSE"

          COMMENT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -n "$COMMENT" ] && [ "$COMMENT" != "null" ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$COMMENT"
          else
            echo "Error: AI response was empty or invalid."
            exit 1
          fi

  # ──────────────────────────────────────
  # 4. Deploy Preview (develop への PR・push)
  # ──────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Vercel CLI をインストール
        run: npm install --global vercel@latest

      - name: Vercel プロジェクトの情報を取得
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Preview ビルド
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Preview にデプロイ
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: PRにプレビューURLをコメント
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ プレビューデプロイが完了しました！\n\n🔗 **Preview URL**: ${{ steps.deploy.outputs.preview_url }}`
            })

  # ──────────────────────────────────────
  # 5. Deploy Production (main への push)
  # ──────────────────────────────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Vercel CLI をインストール
        run: npm install --global vercel@latest

      - name: Vercel プロジェクトの情報を取得
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Production ビルド
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Production にデプロイ
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}